name: Master Branch CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build --if-present

  # Build image on GitHub (fast runner); VPS only pulls — avoids 30m+ builds on small servers.
  build-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Image name (GHCR is lowercase)
        id: image
        run: |
          echo "IMAGE_BASE=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.IMAGE_BASE }}:latest
            ${{ steps.image.outputs.IMAGE_BASE }}:${{ github.sha }}

  cd:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server with SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          # Pull + up is quick; keep headroom for slow networks.
          command_timeout: 20m
          script: |
            APP_DIR="/var/www/polypulse"
            cd "$APP_DIR"
            git pull origin main
            if [ ! -f .env ]; then
              cp .env.example .env
            fi
            export APP_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest"
            docker compose pull
            docker compose up -d --no-build
            docker compose ps
            APP_PORT="${HEALTH_PORT:-${PORT:-4000}}"
            for i in 1 2 3 4 5 6; do
              if curl -fsS "http://127.0.0.1:${APP_PORT}/health" >/dev/null; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for app... attempt ${i}/6"
              sleep 5
            done
            echo "Health check failed"
            docker compose logs --tail=120 app
            exit 1
