services:
  app:
    # Local: default tag. CI/CD: workflow sets APP_IMAGE=ghcr.io/owner/repo:latest and uses pull + --no-build.
    image: ${APP_IMAGE:-polypulse-app}
    build: .
    env_file: .env
    ports:
      - "${HEALTH_PORT}:3000"
    volumes:
      - polymarkulse_data:/app/data
    restart: unless-stopped

volumes:
  polymarkulse_data:
